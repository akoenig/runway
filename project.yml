name: Runway
options:
  bundleIdPrefix: com.andrekoenig.runway
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Runway:
    type: application
    platform: macOS
    sources:
      - path: Runway
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrekoenig.runway
        PRODUCT_NAME: Runway
        INFOPLIST_FILE: Runway/Info.plist
        CODE_SIGN_ENTITLEMENTS: Runway/Runway.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    entitlements:
      path: Runway/Runway.entitlements
