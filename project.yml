name: Runway
options:
  bundleIdPrefix: com.andrekoenig.runway
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Runway:
    type: application
    platform: macOS
    sources:
      - path: Runway
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrekoenig.runway
        PRODUCT_NAME: Runway
        INFOPLIST_FILE: Runway/Info.plist
        CODE_SIGN_ENTITLEMENTS: Runway/Runway.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    entitlements:
      path: Runway/Runway.entitlements

  RunwayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RunwayTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Runway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrekoenig.runway.tests
        PRODUCT_NAME: RunwayTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Runway.app/Contents/MacOS/Runway"
        BUNDLE_LOADER: "$(TEST_HOST)"
